<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<body>
    <!-- anchor tag and target(open link in a new tab) -->
    <h1>Links</h1>

    <h2>Without target</h2>
    <p>This is <a href="https://google.com">Google's</a> website.</p> 
    <p>This is <a href="https://facebook.com">Facebook's</a> website.</p>

    <h2>With target</h2>
    <p>This is <a href="https://google.com" target="_blank">Google's</a> website.</p> 
    <p>This is <a href="https://facebook.com" target="_blank">Facebook's</a> website.</p>

    <h2>link another page</h2>
    <p><a href="intro.html">Go to introduction.</a></p>

</body>
</html>
