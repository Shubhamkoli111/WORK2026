<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List</title>
  </head>
  <body>
    <h1>Lists</h1>
    <!-- unordered list -->
    <ul>
      <li>ina</li>
      <li>mina</li>
      <li>tika</li>
    </ul>

    <!-- ordered list -->
    <ol>
      <li>wake up</li>
      <li>brush ur teeth</li>
      <li>go to work</li>
    </ol>

    <!-- Description list -->
    <dl>
      <dt>HTML</dt>
      <dd>A markup language for creating web pages.</dd>

      <dt>CSS</dt>
      <dd>Used for styling HTML pages.</dd>
    </dl>

    <!-- Nesting list    -->

    <ul>
      <li>Fruits</li>
      <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Chery</li>
      </ul>
      <li>Vegetables</li>
      <ul>
        <li>Potato</li>
        <li>Tomato</li>
        <li>Cabbage</li>
      </ul>
    </ul>
  </body>
</html>
