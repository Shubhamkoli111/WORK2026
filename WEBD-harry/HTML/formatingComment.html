<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Page</title>
</head>
<body>
    <p>See how <b><i>bold & italic</i></b> looks like..</p> <!--combining formats-->
    <p><u>underlined</u> word.</p>
    <p>Strikethrough means <s>this</s> :) </p>
    <p>H<sub>2</sub>O</p>   <!--subscript-->
    <p>2<sup>n</sup></p>    <!--superscript-->
    <p>line <br><br><br><br><br> break....</p>

    <!-- whitespaces -->
     <pre>
        <p>this    is     magic    of pre tag.</p>
     </pre>
    
</body>
</html>
